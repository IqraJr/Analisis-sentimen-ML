<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator - Suara Mahasiswa</title>
    
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <!-- Animated background orbs -->
    <div class="glow-orb orb-1 float-orb-1"></div>
    <div class="glow-orb orb-2 float-orb-2"></div>
    
    <div class="login-container">
        <!-- Floating brand info above card -->
        <div class="login-brand">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Logo" class="login-logo">
            <h2>Suara Mahasiswa</h2>
            <p>Sistem Analisis Sentimen Kampus</p>
        </div>

        <!-- Glassmorphism Login Card -->
        <div id="loginCard" class="login-card glass-panel">
            <div class="login-card-header">
                <h3>Verifikasi Keamanan</h3>
                <p>Silakan masukkan kata sandi administrator untuk mengakses dasbor utama.</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="adminPassword" class="login-field-label">Kata Sandi Admin</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="adminPassword" 
                            placeholder="Masukkan kata sandi..." 
                            required
                        >
                        <!-- Show/Hide Eye Toggle -->
                        <button type="button" id="passwordToggle" class="password-toggle-btn" aria-label="Tampilkan sandi">
                            <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon hidden"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Error Message Banner (Initially Hidden) -->
                <div id="loginError" class="login-error-msg hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span id="errorText">Kata sandi yang Anda masukkan salah!</span>
                </div>

                <button type="submit" id="loginSubmitBtn" class="btn btn-primary">
                    <span class="btn-text">Masuk ke Dasbor</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </div>
        
        <div class="login-back-link">
            <a href="/">← Kembali ke Portal Ulasan</a>
        </div>
    </div>

    <!-- Javascript links -->
    <script>
        // Simple inline handler specifically for the login page actions
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const adminPassword = document.getElementById("adminPassword");
            const loginCard = document.getElementById("loginCard");
            const loginError = document.getElementById("loginError");
            const errorText = document.getElementById("errorText");
            const submitBtn = document.getElementById("loginSubmitBtn");
            const btnText = submitBtn.querySelector(".btn-text");
            const spinner = submitBtn.querySelector(".spinner");
            
            const passwordToggle = document.getElementById("passwordToggle");
            const eyeOpen = document.getElementById("eyeOpen");
            const eyeClosed = document.getElementById("eyeClosed");
            
            // Password Show/Hide Toggle
            passwordToggle.addEventListener("click", () => {
                if (adminPassword.type === "password") {
                    adminPassword.type = "text";
                    eyeOpen.classList.add("hidden");
                    eyeClosed.classList.remove("hidden");
                } else {
                    adminPassword.type = "password";
                    eyeOpen.classList.remove("hidden");
                    eyeClosed.classList.add("hidden");
                }
            });

            // Login Form submission
            loginForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                
                const password = adminPassword.value;
                if (!password) return;

                // Show loading spinner
                submitBtn.disabled = true;
                btnText.classList.add("hidden");
                spinner.classList.remove("hidden");
                loginError.classList.add("hidden");

                try {
                    const response = await fetch("/api/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ password })
                    });

                    const json = await response.json();

                    if (response.ok && json.status === "success") {
                        // Success -> Redirect to Admin Dashboard
                        window.location.href = "/admin";
                    } else {
                        // Fail -> Shake login card & show error message
                        shakeCard();
                        errorText.textContent = json.message || "Kata sandi salah!";
                        loginError.classList.remove("hidden");
                        adminPassword.value = "";
                        adminPassword.focus();
                    }
                } catch (err) {
                    console.error("Login request failed:", err);
                    shakeCard();
                    errorText.textContent = "Koneksi terputus. Silakan coba lagi.";
                    loginError.classList.remove("hidden");
                } finally {
                    // Reset button states
                    submitBtn.disabled = false;
                    btnText.classList.remove("hidden");
                    spinner.classList.add("hidden");
                }
            });

            function shakeCard() {
                loginCard.classList.remove("shake-anim");
                // Trigger reflow to restart CSS animation
                void loginCard.offsetWidth;
                loginCard.classList.add("shake-anim");
            }
        });
    </script>
</body>
</html>
